name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: Node.js のセットアップ
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: 依存関係のインストール
      run: npm ci

    - name: リンティング
      run: npm run lint

    - name: テスト
      run: npm test

    - name: ビルド
      run: npm run build

    - name: ビルド成果物の確認
      run: |
        if [ ! -f "build/index.js" ]; then
          echo "ビルド失敗: build/index.js が見つかりません"
          exit 1
        fi
        echo "ビルド成功: build/index.js が作成されました"

  publish:
    needs: quality-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: Node.js のセットアップ
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        registry-url: 'https://registry.npmjs.org'

    - name: 依存関係のインストール
      run: npm ci --ignore-scripts

    - name: ビルド
      run: npm run build

    - name: タグとpackage.jsonのバージョン一致を確認
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        PKG_VERSION=$(node -p "require('./package.json').version")
        if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
          echo "エラー: タグ v${TAG_VERSION} と package.json ${PKG_VERSION} のバージョンが一致しません"
          exit 1
        fi
        echo "タグとpackage.jsonのバージョン一致: ${PKG_VERSION}"
        MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
        if [ "$PKG_VERSION" != "$MANIFEST_VERSION" ]; then
          echo "エラー: package.json (${PKG_VERSION}) と manifest.json (${MANIFEST_VERSION}) のバージョンが一致しません"
          exit 1
        fi
        echo "manifest.jsonのバージョンも一致: ${MANIFEST_VERSION}"

    - name: npm に公開済みか確認
      id: check-npm
      run: |
        PKG_VERSION=$(node -p "require('./package.json').version")
        PKG_NAME=$(node -p "require('./package.json').name")
        if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
          echo "バージョン ${PKG_VERSION} は既に npm に公開済みです。スキップします。"
          echo "already_published=true" >> "$GITHUB_OUTPUT"
        else
          echo "already_published=false" >> "$GITHUB_OUTPUT"
        fi

    - name: クールダウン期間の確認 (2週間)
      id: check-cooldown
      if: steps.check-npm.outputs.already_published != 'true'
      run: |
        PKG_NAME=$(node -p "require('./package.json').name")
        COOLDOWN_DAYS=14
        COOLDOWN_SECONDS=$((COOLDOWN_DAYS * 24 * 60 * 60))

        LAST_PUBLISHED=$(npm view "${PKG_NAME}" time --json 2>/dev/null | node -e "
          const chunks = [];
          process.stdin.on('data', d => chunks.push(d));
          process.stdin.on('end', () => {
            try {
              const data = JSON.parse(chunks.join(''));
              const versions = Object.keys(data).filter(k => !['created', 'modified'].includes(k));
              if (versions.length === 0) { process.stdout.write(''); process.exit(0); }
              versions.sort((a, b) => new Date(data[b]) - new Date(data[a]));
              process.stdout.write(data[versions[0]]);
            } catch { process.stdout.write(''); }
          });
        ")

        SECONDS_PER_DAY=86400

        if [ -z "$LAST_PUBLISHED" ]; then
          echo "npm にまだ公開されていません。公開を続けます。"
          echo "cooldown_ok=true" >> "$GITHUB_OUTPUT"
        else
          LAST_PUBLISHED_EPOCH=$(date -d "$LAST_PUBLISHED" +%s)
          NOW_EPOCH=$(date +%s)
          ELAPSED=$((NOW_EPOCH - LAST_PUBLISHED_EPOCH))

          if [ "$ELAPSED" -lt "$COOLDOWN_SECONDS" ]; then
            REMAINING_DAYS=$(( (COOLDOWN_SECONDS - ELAPSED) / SECONDS_PER_DAY ))
            REMAINING_HOURS=$(( (COOLDOWN_SECONDS - ELAPSED) % SECONDS_PER_DAY / 3600 ))
            echo "クールダウン期間中です。最後の公開: ${LAST_PUBLISHED}"
            echo "あと約 ${REMAINING_DAYS} 日 ${REMAINING_HOURS} 時間後に公開可能になります。スキップします。"
            echo "cooldown_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "クールダウン期間を過ぎています。最後の公開: ${LAST_PUBLISHED}"
            echo "cooldown_ok=true" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: npm に公開
      if: steps.check-npm.outputs.already_published != 'true' && steps.check-cooldown.outputs.cooldown_ok == 'true'
      run: npm publish --provenance
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
